name: CI - integration tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Compose (ensure Docker is available)
        run: |
          docker --version
          docker compose version || true

      - name: Build and start integration stack
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1
        run: |
          # bring up integration stack (use your integration compose if present)
          docker compose -f docker-compose.integration.yml up -d --build

      - name: Wait for backend health endpoint
        run: |
          echo "Waiting for backend health (http://localhost:5000/health)..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5000/health >/dev/null 2>&1; then
              echo "Backend healthy"
              break
            fi
            echo -n "."
            sleep 1
            if [ $i -eq 60 ]; then
              echo "Backend did not become healthy" >&2
              docker compose -f docker-compose.integration.yml logs --no-color
              exit 1
            fi
          done

      - name: Run tests
        env:
          # if your tests expect environment variables, set them here or via the integration compose
          PYTHONUNBUFFERED: 1
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pytest -v --maxfail=1

      - name: Tear down integration stack
        if: always()
        run: |
          docker compose -f docker-compose.integration.yml down -v
