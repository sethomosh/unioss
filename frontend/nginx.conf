server {
  listen       80;
  server_name  localhost;

  # ── 1) Proxy all /api/* calls to the Flask backend ──
  location /api/ {
    proxy_pass         http://backend:5000;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";
  }

  # ── 2) Proxy /health to the Flask backend’s /health ──
  location = /health {
    proxy_pass         http://backend:5000/api/health;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  # ── 3) Everything else: serve your built React app ──
  root   /usr/share/nginx/html;
  index  index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # ── 4) Long‐cache static assets ──
  location ~* \.(js|css|png|jpg|jpeg|svg|woff2?)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
