#version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .                                                                  
    ports:
      - "5000:5000"                               
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./logs:/app/logs 
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  snmpsim:
    image: tandrup/snmpsim
    volumes:
      - ./snmp-sim/data:/usr/local/snmpsim/data
    ports:
      - "1161:1161/udp"
    command: >
      bash -c "snmpsimd.py
               --data-dir=/usr/local/snmpsim/data
               --agent-udpv4-endpoint=0.0.0.0:1161
               --community=public
               --log-level=info"
    healthcheck:
      test: ["CMD-SHELL", "snmpwalk -v2c -c public 127.0.0.1:1161 .1.3.6.1.2.1.1.1.0"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  db_data:
  #logs_data: