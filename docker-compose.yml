#version: "2.4"

services:
  db:
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_TCP_PORT: 3306
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u $MYSQL_USER -p$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unisys-net

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # map old MYSQL_* values into the UNISYS_* env names used by app/main.py
      UNISYS_DB_HOST: db
      UNISYS_DB_USER: ${MYSQL_USER}
      UNISYS_DB_PASS: ${MYSQL_PASSWORD}
      UNISYS_DB_NAME: ${MYSQL_DB}
      UNISYS_DB_PORT: ${MYSQL_TCP_PORT:-3306}
      UNISYS_REDIS_HOST: redis
      UNISYS_REDIS_PORT: 6379
      SNMP_TARGET: snmpsim
      MYSQL_DB: ${MYSQL_DB}
    depends_on:
      db:
        condition: service_healthy
      snmpsim:
        condition: service_healthy
    volumes:
      - logs-data:/app/logs:rw
      - ./:/app:rw
    command: >
      sh -c "
        /usr/local/bin/wait-for-it.sh --timeout=60 db:3306 -- &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - unisys-net


  snmpsim:
    build:
      context: .
      dockerfile: Dockerfile.snmpsim
    image: unisys/local-snmpsim:dev   # local image tag, avoids remote registry
    user: root
    volumes:
      - ./snmp-sim/data:/usr/local/snmpsim/data
    ports:
      - "1161:1161/udp"
    command:
      - snmpsimd.py
      - --data-dir=/usr/local/snmpsim/data
      - --variation-modules-dir=/usr/local/lib/python3.4/site-packages/snmpsim/variation
      - --agent-udpv4-endpoint=0.0.0.0:1161
      - --logging-method=stdout
      - --process-user=nobody
      - --process-group=nogroup

    healthcheck:
      test: ["CMD-SHELL", "snmpwalk -v2c -c public 127.0.0.1:1161 1.3.6.1.2.1.1.1.0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - unisys-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: "/api"
    ports:
      - "3000:80"
    env_file:
      - frontend/.env
    depends_on:
      - backend
    networks:
      - unisys-net

  poller:
    build: .
    command: python -u -m backend.poller --interval 5
    env_file:
      - .env
    environment:
      UNISYS_MODE: fake
      UNISYS_POLL_INTERVAL: "5"
      SNMP_TARGET: snmpsim
      SNMP_HOST: snmpsim
      SNMP_PORT: "1161"
      SNMP_COMMUNITY: "public"
    depends_on:
      db:
        condition: service_healthy
      snmpsim:
        condition: service_healthy
    working_dir: /app
    restart: unless-stopped
    networks:
      - unisys-net

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    networks:
      - unisys-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5



networks:
  unisys-net:
    driver: bridge

volumes:
  db_data:
  logs-data:
